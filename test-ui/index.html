<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Ingestion - Test Suite</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
  }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #f0f6fc;
    white-space: nowrap;
  }

  .config {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 280px;
  }

  .config label {
    font-size: 13px;
    color: #8b949e;
    white-space: nowrap;
  }

  .config input {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e1e4e8;
    padding: 6px 10px;
    font-size: 13px;
    width: 240px;
  }

  .config input:focus { outline: none; border-color: #58a6ff; }

  .actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  button {
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: #30363d; }
  button.secondary:hover { background: #3d444d; }

  .counters {
    display: flex;
    gap: 14px;
    font-size: 14px;
    font-weight: 600;
  }

  .counter { display: flex; align-items: center; gap: 4px; }
  .counter .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-pass { background: #3fb950; }
  .dot-fail { background: #f85149; }
  .dot-total { background: #8b949e; }

  main { max-width: 900px; margin: 24px auto; padding: 0 24px; }

  .category {
    margin-bottom: 20px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
  }

  .category-header {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    background: #1c2128;
    border-bottom: 1px solid #30363d;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .category-header button {
    font-size: 12px;
    padding: 4px 12px;
  }

  .test-item {
    padding: 10px 16px;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  .test-item:last-child { border-bottom: none; }

  .status-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }

  .status-pending { background: #30363d; }
  .status-running { background: #d29922; animation: pulse 1s infinite; }
  .status-pass { background: #238636; }
  .status-fail { background: #da3633; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .test-name { flex: 1; }
  .test-duration { color: #8b949e; font-size: 12px; min-width: 50px; text-align: right; }

  .test-item .run-one {
    font-size: 11px;
    padding: 2px 10px;
    background: #30363d;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .test-item:hover .run-one { opacity: 1; }

  .test-detail {
    display: none;
    padding: 8px 16px 12px 46px;
    font-size: 12px;
    border-bottom: 1px solid #21262d;
  }

  .test-detail.open { display: block; }

  .test-detail pre {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.5;
    color: #c9d1d9;
    max-height: 300px;
    overflow-y: auto;
  }

  .error-msg { color: #f85149; }

  .progress-bar {
    height: 3px;
    background: #30363d;
    position: relative;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: #238636;
    transition: width 0.3s;
    width: 0%;
  }
</style>
</head>
<body>

<header>
  <h1>Test Suite</h1>
  <div class="config">
    <label for="baseUrl">API Base URL</label>
    <input id="baseUrl" type="text" value="http://localhost:8080" />
  </div>
  <div class="actions">
    <button id="runAllBtn" onclick="runAll()">Run All</button>
    <button class="secondary" onclick="resetAll()">Reset</button>
  </div>
  <div class="counters">
    <span class="counter"><span class="dot dot-pass"></span><span id="passCount">0</span></span>
    <span class="counter"><span class="dot dot-fail"></span><span id="failCount">0</span></span>
    <span class="counter"><span class="dot dot-total"></span><span id="totalCount">0</span> / <span id="totalTests">0</span></span>
  </div>
</header>
<div class="progress-bar"><div class="progress-bar-fill" id="progressBar"></div></div>

<main id="testContainer"></main>

<script>
const BASE = () => document.getElementById('baseUrl').value.replace(/\/+$/, '');

let passed = 0, failed = 0, ran = 0, totalTests = 0;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function assert(cond, msg) {
  if (!cond) throw new Error(msg);
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(BASE() + path, opts);
  let data = null;
  const text = await res.text();
  try { data = JSON.parse(text); } catch {}
  return { status: res.status, data, text };
}

const categories = [
  {
    name: 'Health',
    tests: [
      {
        name: 'GET /health returns 200',
        fn: async () => {
          const res = await api('GET', '/health');
          assert(res.status === 200, `Expected 200, got ${res.status}`);
          assert(res.data.status === 'ok', `Expected status "ok", got "${res.data.status}"`);
          return res;
        }
      }
    ]
  },
  {
    name: 'Webhook CRUD',
    tests: [
      {
        name: 'Create webhook returns 201',
        fn: async (ctx) => {
          const res = await api('POST', '/webhooks', {
            application_id: 'test-app-' + uid(),
            url: 'http://example.com/hook',
            secret: 'sec-' + uid(),
            event_types: ['order.created', 'order.updated']
          });
          assert(res.status === 201, `Expected 201, got ${res.status}`);
          assert(res.data.id, 'Missing id in response');
          assert(res.data.active === true, 'Expected active to be true');
          ctx.webhookId = res.data.id;
          ctx.appId = res.data.application_id;
          return res;
        }
      },
      {
        name: 'Get webhook returns created data',
        fn: async (ctx) => {
          assert(ctx.webhookId, 'No webhook created from previous test');
          const res = await api('GET', '/webhooks/' + ctx.webhookId);
          assert(res.status === 200, `Expected 200, got ${res.status}`);
          assert(res.data.id === ctx.webhookId, 'ID mismatch');
          return res;
        }
      },
      {
        name: 'Update webhook URL and active flag',
        fn: async (ctx) => {
          assert(ctx.webhookId, 'No webhook created from previous test');
          const res = await api('PUT', '/webhooks/' + ctx.webhookId, {
            url: 'http://updated.com/hook',
            active: false
          });
          assert(res.status === 200, `Expected 200, got ${res.status}`);
          assert(res.data.url === 'http://updated.com/hook', `URL not updated: ${res.data.url}`);
          assert(res.data.active === false, 'Expected active to be false');
          return res;
        }
      },
      {
        name: 'Delete webhook returns 204',
        fn: async (ctx) => {
          assert(ctx.webhookId, 'No webhook created from previous test');
          const res = await api('DELETE', '/webhooks/' + ctx.webhookId);
          assert(res.status === 204, `Expected 204, got ${res.status}`);
          return res;
        }
      },
      {
        name: 'Get deleted webhook returns 404',
        fn: async (ctx) => {
          assert(ctx.webhookId, 'No webhook created from previous test');
          const res = await api('GET', '/webhooks/' + ctx.webhookId);
          assert(res.status === 404, `Expected 404, got ${res.status}`);
          return res;
        }
      },
      {
        name: 'Create webhook with missing fields returns 400',
        fn: async () => {
          const res = await api('POST', '/webhooks', { application_id: 'app-1' });
          assert(res.status === 400, `Expected 400, got ${res.status}`);
          return res;
        }
      }
    ]
  },
  {
    name: 'Event Ingestion',
    tests: [
      {
        name: 'Ingest event returns 201 with event_id',
        fn: async (ctx) => {
          const res = await api('POST', '/events', {
            application_id: 'test-app-' + uid(),
            event_type: 'order.created',
            idempotency_key: 'key-' + uid(),
            payload: { order_id: '123', amount: 49.99 }
          });
          assert(res.status === 201, `Expected 201, got ${res.status}`);
          assert(res.data.event_id, 'Missing event_id');
          assert(res.data.status === 'created', `Expected status "created", got "${res.data.status}"`);
          ctx.idempotencyApp = 'idemp-app-' + uid();
          ctx.idempotencyKey = 'idemp-key-' + uid();
          return res;
        }
      },
      {
        name: 'Duplicate idempotency key returns already_processed',
        fn: async (ctx) => {
          const appId = ctx.idempotencyApp || 'idemp-app-' + uid();
          const key = ctx.idempotencyKey || 'idemp-key-' + uid();
          const body = {
            application_id: appId,
            event_type: 'order.created',
            idempotency_key: key,
            payload: { test: true }
          };
          const first = await api('POST', '/events', body);
          assert(first.status === 201, `First request: expected 201, got ${first.status}`);

          const second = await api('POST', '/events', body);
          assert(second.status === 200, `Second request: expected 200, got ${second.status}`);
          assert(second.data.status === 'already_processed', `Expected "already_processed", got "${second.data.status}"`);
          return second;
        }
      },
      {
        name: 'Ingest event with missing fields returns 400',
        fn: async () => {
          const cases = [
            { event_type: 'x', idempotency_key: 'k' },
            { application_id: 'a', idempotency_key: 'k' },
            { application_id: 'a', event_type: 'x' }
          ];
          for (const body of cases) {
            const res = await api('POST', '/events', body);
            assert(res.status === 400, `Expected 400 for ${JSON.stringify(body)}, got ${res.status}`);
          }
          return { status: 400, data: { message: 'All 3 validation cases returned 400' } };
        }
      }
    ]
  },
  {
    name: 'Delivery Fan-out',
    tests: [
      {
        name: 'Matching webhook creates 1 delivery',
        fn: async () => {
          const appId = 'fanout-app-' + uid();
          const whRes = await api('POST', '/webhooks', {
            application_id: appId,
            url: 'http://example.com/hook',
            secret: 'sec-' + uid(),
            event_types: ['order.created']
          });
          assert(whRes.status === 201, `Webhook create failed: ${whRes.status}`);

          const evRes = await api('POST', '/events', {
            application_id: appId,
            event_type: 'order.created',
            idempotency_key: 'match-' + uid(),
            payload: { test: true }
          });
          assert(evRes.status === 201, `Event ingest failed: ${evRes.status}`);
          assert(evRes.data.deliveries_count === 1, `Expected 1 delivery, got ${evRes.data.deliveries_count}`);

          await api('DELETE', '/webhooks/' + whRes.data.id);
          return evRes;
        }
      },
      {
        name: 'Wildcard webhook matches any event type',
        fn: async () => {
          const appId = 'wild-app-' + uid();
          const whRes = await api('POST', '/webhooks', {
            application_id: appId,
            url: 'http://example.com/hook',
            secret: 'sec-' + uid(),
            event_types: ['*']
          });
          assert(whRes.status === 201, `Webhook create failed: ${whRes.status}`);

          const evRes = await api('POST', '/events', {
            application_id: appId,
            event_type: 'some.random.event',
            idempotency_key: 'wild-' + uid(),
            payload: {}
          });
          assert(evRes.status === 201, `Event ingest failed: ${evRes.status}`);
          assert(evRes.data.deliveries_count === 1, `Expected 1 delivery, got ${evRes.data.deliveries_count}`);

          await api('DELETE', '/webhooks/' + whRes.data.id);
          return evRes;
        }
      },
      {
        name: 'Multiple webhooks: 2 matching + 1 non-matching = 2 deliveries',
        fn: async () => {
          const appId = 'multi-app-' + uid();
          const ids = [];

          let r = await api('POST', '/webhooks', {
            application_id: appId, url: 'http://example.com/h1',
            secret: 's1', event_types: ['order.created']
          });
          ids.push(r.data.id);

          r = await api('POST', '/webhooks', {
            application_id: appId, url: 'http://example.com/h2',
            secret: 's2', event_types: ['order.created']
          });
          ids.push(r.data.id);

          r = await api('POST', '/webhooks', {
            application_id: appId, url: 'http://example.com/h3',
            secret: 's3', event_types: ['payment.completed']
          });
          ids.push(r.data.id);

          const evRes = await api('POST', '/events', {
            application_id: appId,
            event_type: 'order.created',
            idempotency_key: 'multi-' + uid(),
            payload: {}
          });
          assert(evRes.status === 201, `Event ingest failed: ${evRes.status}`);
          assert(evRes.data.deliveries_count === 2, `Expected 2 deliveries, got ${evRes.data.deliveries_count}`);

          for (const id of ids) await api('DELETE', '/webhooks/' + id);
          return evRes;
        }
      },
      {
        name: 'No matching webhook = 0 deliveries',
        fn: async () => {
          const appId = 'nomatch-app-' + uid();
          const whRes = await api('POST', '/webhooks', {
            application_id: appId,
            url: 'http://example.com/hook',
            secret: 'sec-' + uid(),
            event_types: ['payment.completed']
          });

          const evRes = await api('POST', '/events', {
            application_id: appId,
            event_type: 'order.created',
            idempotency_key: 'nomatch-' + uid(),
            payload: {}
          });
          assert(evRes.status === 201, `Event ingest failed: ${evRes.status}`);
          assert(evRes.data.deliveries_count === 0, `Expected 0 deliveries, got ${evRes.data.deliveries_count}`);

          await api('DELETE', '/webhooks/' + whRes.data.id);
          return evRes;
        }
      }
    ]
  }
];

function buildUI() {
  const container = document.getElementById('testContainer');
  container.innerHTML = '';
  totalTests = 0;

  categories.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'category';
    div.innerHTML = `<div class="category-header"><span>${cat.name}</span><button class="secondary" onclick="runCategory(${ci})">Run</button></div>`;

    cat.tests.forEach((test, ti) => {
      totalTests++;
      const id = `test-${ci}-${ti}`;
      div.innerHTML += `
        <div class="test-item" id="${id}" onclick="toggleDetail('${id}-detail')">
          <span class="status-icon status-pending" id="${id}-icon"></span>
          <span class="test-name">${test.name}</span>
          <span class="test-duration" id="${id}-dur"></span>
          <button class="run-one" onclick="event.stopPropagation(); runSingle(${ci}, ${ti})">Run</button>
        </div>
        <div class="test-detail" id="${id}-detail"><pre id="${id}-log"></pre></div>
      `;
    });

    container.appendChild(div);
  });

  document.getElementById('totalTests').textContent = totalTests;
}

function toggleDetail(id) {
  document.getElementById(id).classList.toggle('open');
}

function setStatus(ci, ti, status, duration, log) {
  const id = `test-${ci}-${ti}`;
  const icon = document.getElementById(id + '-icon');
  const dur = document.getElementById(id + '-dur');
  const logEl = document.getElementById(id + '-log');

  icon.className = 'status-icon status-' + status;
  icon.textContent = status === 'pass' ? '\u2713' : status === 'fail' ? '\u2717' : status === 'running' ? '\u25CF' : '';

  if (duration !== null) dur.textContent = duration + 'ms';
  if (log !== null) logEl.textContent = log;
}

function updateCounters() {
  document.getElementById('passCount').textContent = passed;
  document.getElementById('failCount').textContent = failed;
  document.getElementById('totalCount').textContent = ran;
  const pct = totalTests > 0 ? (ran / totalTests) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressBar').style.background = failed > 0 ? '#da3633' : '#238636';
}

async function runTest(ci, ti, ctx) {
  const test = categories[ci].tests[ti];
  setStatus(ci, ti, 'running', null, null);

  const start = performance.now();
  try {
    const res = await test.fn(ctx);
    const dur = Math.round(performance.now() - start);
    const log = `PASS\n\nResponse (${res.status}):\n${JSON.stringify(res.data, null, 2)}`;
    setStatus(ci, ti, 'pass', dur, log);
    passed++;
  } catch (err) {
    const dur = Math.round(performance.now() - start);
    const log = `FAIL: ${err.message}`;
    setStatus(ci, ti, 'fail', dur, log);
    const detailEl = document.getElementById(`test-${ci}-${ti}-detail`);
    detailEl.classList.add('open');
    failed++;
  }
  ran++;
  updateCounters();
}

async function runCategory(ci) {
  const ctx = {};
  for (let ti = 0; ti < categories[ci].tests.length; ti++) {
    await runTest(ci, ti, ctx);
  }
}

async function runSingle(ci, ti) {
  await runTest(ci, ti, {});
}

async function runAll() {
  const btn = document.getElementById('runAllBtn');
  btn.disabled = true;
  passed = 0; failed = 0; ran = 0;
  updateCounters();

  for (let ci = 0; ci < categories.length; ci++) {
    await runCategory(ci);
  }
  btn.disabled = false;
}

function resetAll() {
  passed = 0; failed = 0; ran = 0;
  updateCounters();
  categories.forEach((cat, ci) => {
    cat.tests.forEach((_, ti) => {
      setStatus(ci, ti, 'pending', null, '');
      document.getElementById(`test-${ci}-${ti}-dur`).textContent = '';
      document.getElementById(`test-${ci}-${ti}-detail`).classList.remove('open');
    });
  });
}

buildUI();
updateCounters();
</script>
</body>
</html>
